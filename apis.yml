aid: legiscan
name: LegiScan
description: >-
  LegiScan is a national legislative tracking service providing real-time data
  on bill activity, voting records, and legislative actions across all 50 US
  states and Congress. The LegiScan API offers a JSON-based RPC-style interface
  supporting both pull and push data delivery models. Developers and
  organizations can monitor legislation in near real-time, search full-text bill
  content, retrieve roll call votes, access sponsor and legislator information,
  and download bulk session datasets. The free public tier provides 30,000
  queries per month, with paid subscription plans offering higher limits and
  push-based real-time updates pushed every 15 minutes to 4 hours as changes
  are detected.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/legiscan/refs/heads/main/apis.yml
